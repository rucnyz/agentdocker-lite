name: Publish to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Build Go binary and place in _vendor/
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: |
          cd go
          CGO_ENABLED=1 go build \
            -tags "exclude_graphdriver_btrfs containers_image_openpgp" \
            -o ../src/nitrobox/_vendor/nitrobox-core \
            ./cmd/nitrobox-core/
          chmod +x ../src/nitrobox/_vendor/nitrobox-core

      # Build wheel with maturin (includes Rust _core + Go binary in _vendor/)
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -i python3.12 python3.13
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-x86_64
          path: dist/

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  publish:
    name: Publish
    needs: [build-wheel, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
      - uses: actions/checkout@v6
      - run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
