name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rootless:
    name: Rootless tests (no root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/test_security.py -v -k "Rootless or Landlock"

  root:
    name: Root tests (sudo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: sudo -E $(which python) -m pytest tests/test_sandbox.py tests/test_security.py -v -k "not Rootless and not Landlock"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src/
